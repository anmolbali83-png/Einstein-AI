<template>
    <div class="case-page-container">

        <!-- ===== TITLE BAR ===== -->
        <div class="title-bar">
            <span>Create a Support Case</span>
        </div>

        <!-- ===== HEADER ===== -->
        <div class="case-header slds-p-around_medium slds-border_bottom">
            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-start">
                <!-- Left: Case identity -->
                <div class="slds-col">
                    <p class="case-type-label">Parts Technical Help</p>
                    <template if:true={showCaseNumber}>
                        <p class="case-number">{caseNumber}</p>
                    </template>
                    <p class="status-label slds-m-top_xx-small">Status</p>
                    <p class="status-value">New</p>
                </div>
                <!-- Right: Action links -->
                <div class="slds-col slds-text-align_right">
                    <div class="header-actions slds-m-bottom_xx-small">
                        <button class="header-link" type="button">
                            <lightning-icon icon-name="utility:favorite" size="xx-small" class="slds-m-right_xxx-small"></lightning-icon>
                            Add Favorite
                        </button>
                        <button class="header-link slds-m-left_medium" type="button">Copy</button>
                        <button class="header-link slds-m-left_medium" type="button">Print to PDF</button>
                    </div>
                    <p class="required-note"><span class="slds-text-color_error">*</span> = Required Information</p>
                </div>
            </div>
        </div>

        <!-- ===== SECTION: Asset / Serial Number Information ===== -->
        <div class="section-wrapper">
            <button class="section-header" type="button" data-section="asset" onclick={toggleSection}>
                <lightning-icon icon-name={assetChevron} size="xx-small" class="chevron-icon"></lightning-icon>
                <span class="section-title">Asset /Serial Number Information</span>
            </button>
            <template if:true={assetOpen}>
                <div class="section-body">
                    <div class="slds-m-bottom_small">
                        <lightning-input
                            type="toggle"
                            label="Asset/Serial Number Not Applicable"
                            checked={assetNotApplicable}
                            onchange={handleAssetToggle}
                            message-toggle-active=""
                            message-toggle-inactive="">
                        </lightning-input>
                    </div>
                    <div class="slds-grid slds-wrap slds-gutters_small slds-grid_vertical-align-end">
                        <div class="slds-col slds-size_3-of-12">
                            <lightning-input
                                label="Asset/Serial Number"
                                value={serialNumber}
                                required
                                onkeyup={handleSerialNumberKeyUp}
                                onchange={handleSerialNumberChange}>
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-p-bottom_xx-small">
                            <template if:true={assetFound}>
                                <button class="clear-search-link" type="button" onclick={handleClearSearch}>Clear Search</button>
                            </template>
                        </div>
                    </div>
                    <template if:true={assetFound}>
                        <div class="asset-found-msg slds-m-top_small">
                            <lightning-icon icon-name="utility:success" size="x-small" variant="success" class="slds-m-right_xx-small"></lightning-icon>
                            <span>VIN/Serial Number found. Product information has been added below.</span>
                        </div>
                    </template>
                </div>
            </template>
        </div>

        <!-- ===== SECTION: Product Information ===== -->
        <div class="section-wrapper">
            <button class="section-header" type="button" data-section="product" onclick={toggleSection}>
                <lightning-icon icon-name={productChevron} size="xx-small" class="chevron-icon"></lightning-icon>
                <span class="section-title">Product Information</span>
            </button>
            <template if:true={productOpen}>
                <div class="section-body">
                    <!-- Row 1: Equipment Identity -->
                    <div class="slds-grid slds-wrap slds-gutters_small slds-m-bottom_small">
                        <div class="slds-col slds-size_3-of-12">
                            <lightning-input label="Brand" value={brand} disabled required></lightning-input>
                        </div>
                        <div class="slds-col slds-size_3-of-12">
                            <lightning-input label="Machine Type" value={machineType} disabled required></lightning-input>
                        </div>
                        <div class="slds-col slds-size_3-of-12">
                            <lightning-input label="Series" value={series} disabled required></lightning-input>
                        </div>
                        <div class="slds-col slds-size_3-of-12">
                            <lightning-input label="Model Number" value={modelNumber} disabled required></lightning-input>
                        </div>
                    </div>
                    <!-- Row 2: Usage Info -->
                    <div class="slds-grid slds-wrap slds-gutters_small slds-m-bottom_small">
                        <div class="slds-col slds-size_3-of-12">
                            <lightning-input label="Unit of Measure" value={unitOfMeasure} disabled></lightning-input>
                        </div>
                        <div class="slds-col slds-size_3-of-12">
                            <lightning-input
                                label="Machine Usage"
                                value={machineUsage}
                                disabled={isMachineUsageDisabled}
                                onchange={handleMachineUsageChange}>
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-size_3-of-12">
                            <lightning-input label="Used With" value={usedWith} onchange={handleUsedWithChange}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_3-of-12">
                            <lightning-input label="Engine Serial #" value={engineSerial} disabled></lightning-input>
                        </div>
                    </div>
                    <!-- Row 3: Part Information -->
                    <div class="slds-grid slds-wrap slds-gutters_small">
                        <div class="slds-col slds-size_3-of-12">
                            <lightning-record-picker
                                label="Part Number"
                                placeholder="Search"
                                object-api-name="Part__c"
                                onchange={handlePartNumberChange}>
                            </lightning-record-picker>
                        </div>
                        <div class="slds-col slds-size_3-of-12">
                            <lightning-input label="Part Description" value={partDescription} disabled></lightning-input>
                        </div>
                        <div class="slds-col slds-size_3-of-12">
                            <lightning-combobox
                                label="No Part Reason"
                                value={noPartReason}
                                options={noPartReasonOptions}
                                placeholder="Select"
                                onchange={handleNoPartReasonChange}>
                            </lightning-combobox>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- ===== FOOTER BUTTONS ===== -->
        <div class="footer-actions">
            <lightning-button label="Save" variant="destructive" onclick={handleSave} disabled={isSaving}></lightning-button>
            <lightning-button label="Submit" variant="neutral"></lightning-button>
            <lightning-button label="Resolve" variant="neutral"></lightning-button>
            <lightning-button label="Cancel" variant="neutral"></lightning-button>
        </div>
    </div>
</template>
